name: CI

on:
  pull_request:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libssl-dev \
            libasound2-dev \
            libdbus-1-dev \
            libgtk-4-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            desktop-file-utils \
            rpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Cache Rust build
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: ubuntu-22.04-glibc-2.35

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --locked --all-targets -- -D warnings

      - name: Validate scripts and desktop metadata
        run: |
          bash -n install.sh scripts/install_helpers.sh tests/install_helpers.bash scripts/oswispa-toggle.sh
          bash tests/install_helpers.bash
          desktop-file-validate packaging/linux/oswispa.desktop

      - name: Validate website claims and links
        run: python3 scripts/check_website.py

      - name: Validate desktop UI and native adapter contracts
        run: |
          python3 -m unittest discover -s desktop/ui/tests -p 'test_*.py'
          node --check desktop/ui/bridge.js
          node --check desktop/ui/tauri-adapter.js
          node --check desktop/ui/app.js

      - name: Build (no GUI feature)
        run: cargo check --locked --no-default-features --all-targets

      - name: Test (no GUI feature)
        run: cargo test --locked --no-default-features

      - name: Build (default features)
        run: cargo check --locked

      - name: Check Tauri desktop shell
        run: |
          cargo check --locked -p oswispa-desktop
          cargo clippy --locked -p oswispa-desktop --all-targets --no-deps -- -D warnings

      - name: Build .deb package (smoke test)
        run: |
          cargo install cargo-deb --version 3.7.0 --locked
          cargo deb --locked

      - name: Build .rpm package (smoke test)
        run: |
          cargo build --release --locked
          cargo install cargo-generate-rpm --version 0.21.0 --locked
          cargo generate-rpm

      - name: Dependency audit
        run: |
          cargo install cargo-audit --version 0.22.2 --locked
          # Accepted transitive-only risks are documented in docs/AUDIT-2026-07-18.md.
          cargo audit \
            --ignore RUSTSEC-2026-0194 \
            --ignore RUSTSEC-2026-0195

  check-macos:
    if: github.event_name != 'pull_request'
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4
        with:
          toolchain: stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Install CMake
        run: brew install cmake

      - name: Build (no GUI feature)
        run: cargo check --locked --no-default-features --all-targets

      - name: Test (no GUI feature)
        run: cargo test --locked --no-default-features

      - name: Check Tauri desktop shell
        run: cargo check --locked -p oswispa-desktop

      - name: Build and run desktop smoke test
        shell: bash
        run: |
          set -euo pipefail
          cargo build --release --locked --no-default-features
          output="$(target/release/oswispa --platform-smoke-test)"
          printf '%s\n' "$output"
          grep -Fq "OSWISPA_PLATFORM_SMOKE_OK version=" <<<"$output"
          grep -Fq "os=macos" <<<"$output"
          grep -Fq "audio=macos-coreaudio-cpal hotkey=macos-rdev input=macos-arboard-enigo" <<<"$output"

  check-windows:
    if: github.event_name != 'pull_request'
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4
        with:
          toolchain: stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Build (no GUI feature)
        run: cargo check --locked --no-default-features --all-targets

      - name: Test (no GUI feature)
        run: cargo test --locked --no-default-features

      - name: Check Tauri desktop shell
        run: cargo check --locked -p oswispa-desktop

      - name: Build and run desktop smoke test
        shell: pwsh
        run: |
          cargo build --release --locked --no-default-features
          if ($LASTEXITCODE -ne 0) { throw "Windows release build failed" }
          $output = & target\release\oswispa.exe --platform-smoke-test
          if ($LASTEXITCODE -ne 0) { throw "Windows platform smoke test failed" }
          $output | Write-Host
          $joined = $output -join "`n"
          if (-not $joined.Contains("OSWISPA_PLATFORM_SMOKE_OK version=")) {
            throw "Windows smoke marker was missing"
          }
          if (-not $joined.Contains("os=windows")) {
            throw "Windows smoke test reported the wrong operating system"
          }
          if (-not $joined.Contains("audio=windows-wasapi-cpal hotkey=windows-rdev input=windows-arboard-enigo")) {
            throw "Windows smoke test did not exercise the expected runtime backends"
          }
