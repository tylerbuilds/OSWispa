name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-release:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Validate tag and source commit
        if: github.ref_type == 'tag'
        shell: bash
        run: |
          set -euo pipefail
          package_version="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n 1)"
          tag_version="${GITHUB_REF_NAME#v}"
          test -n "$package_version"
          test "$tag_version" = "$package_version"
          git fetch --no-tags origin master
          git merge-base --is-ancestor "$GITHUB_SHA" origin/master

  build-linux:
    needs: validate-release
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libssl-dev \
            libasound2-dev \
            libdbus-1-dev \
            libgtk-4-dev \
            desktop-file-utils \
            rpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4
        with:
          toolchain: stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Build release binary (CPU-only)
        run: cargo build --release --locked

      - name: Build packages
        run: |
          cargo install cargo-deb --version 3.7.0 --locked
          cargo deb --locked
          cargo install cargo-generate-rpm --version 0.21.0 --locked
          cargo generate-rpm

      - name: Validate package metadata
        shell: bash
        run: |
          set -euo pipefail
          desktop-file-validate packaging/linux/oswispa.desktop

          deb_path="$(find target/debian -maxdepth 1 -name '*.deb' -print -quit)"
          rpm_path="$(find target/generate-rpm -maxdepth 1 -name '*.rpm' -print -quit)"
          test -n "$deb_path"
          test -n "$rpm_path"

          deb_requires="$(dpkg-deb -f "$deb_path" Depends)"
          for dependency in alsa-utils ydotool netcat-openbsd wl-clipboard xclip xdotool; do
            grep -Eq "(^|, )${dependency}([ ,(]|$)" <<<"$deb_requires"
          done

          rpm_requires="$(rpm -qp --requires "$rpm_path")"
          for dependency in alsa-utils ydotool nmap-ncat wl-clipboard xclip xdotool; do
            grep -Fxq "$dependency" <<<"$rpm_requires"
          done

      - name: Prepare stable asset names
        shell: bash
        run: |
          set -euo pipefail
          deb_path="$(find target/debian -maxdepth 1 -name '*.deb' -print -quit)"
          rpm_path="$(find target/generate-rpm -maxdepth 1 -name '*.rpm' -print -quit)"
          cp "$deb_path" oswispa_amd64.deb
          cp "$rpm_path" oswispa_x86_64.rpm

          mkdir -p dist
          cp target/release/oswispa dist/oswispa
          cp README.md LICENSE dist/
          tar -czf oswispa-linux-amd64.tar.gz -C dist .

      - name: Upload build artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: oswispa-linux-amd64
          retention-days: 7
          if-no-files-found: error
          path: |
            oswispa-linux-amd64.tar.gz
            oswispa_amd64.deb
            oswispa_x86_64.rpm

  build-macos:
    needs: validate-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            target: aarch64-apple-darwin
            arch: arm64
            build_args: --release --locked --no-default-features --features gpu-metal --target aarch64-apple-darwin
          - os: macos-15-intel
            target: x86_64-apple-darwin
            arch: x86_64
            build_args: --release --locked --no-default-features --target x86_64-apple-darwin
    runs-on: ${{ matrix.os }}
    env:
      MACOSX_DEPLOYMENT_TARGET: "12.0"
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Build release binary
        run: cargo build ${{ matrix.build_args }}

      - name: Package macOS app bundle
        shell: bash
        run: |
          set -euo pipefail
          version="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n 1)"
          stage_root="$PWD/dist/macos"
          dmg_root="$stage_root/dmg"
          app_dir="$dmg_root/OSWispa.app"
          contents_dir="$app_dir/Contents"

          rm -rf "$stage_root"
          mkdir -p "$contents_dir/MacOS" "$contents_dir/Resources/bin"

          cp "target/${{ matrix.target }}/release/oswispa" "$contents_dir/Resources/bin/oswispa"
          chmod +x "$contents_dir/Resources/bin/oswispa"

          cp packaging/macos/launcher.sh "$contents_dir/MacOS/OSWispa"
          chmod +x "$contents_dir/MacOS/OSWispa"

          sed "s/@VERSION@/$version/g" packaging/macos/Info.plist.template > "$contents_dir/Info.plist"

          cp packaging/macos/README.txt "$dmg_root/README.txt"
          cp README.md "$dmg_root/README.md"
          cp LICENSE "$dmg_root/LICENSE"
          cp packaging/macos/README.txt "$contents_dir/Resources/README.txt"
          cp LICENSE "$contents_dir/Resources/LICENSE"

          ln -s /Applications "$dmg_root/Applications"

          ditto -c -k --sequesterRsrc --keepParent "$app_dir" "oswispa-macos-${{ matrix.arch }}.zip"
          hdiutil create -volname "OSWispa Installer" -srcfolder "$dmg_root" -ov -format UDZO "oswispa-macos-${{ matrix.arch }}.dmg"

      - name: Upload build artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: oswispa-macos-${{ matrix.arch }}
          retention-days: 7
          if-no-files-found: error
          path: |
            oswispa-macos-${{ matrix.arch }}.zip
            oswispa-macos-${{ matrix.arch }}.dmg

  publish:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-linux, build-macos]
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Verify release set and create checksums
        shell: bash
        run: |
          set -euo pipefail
          cd release-assets
          assets=(
            oswispa-linux-amd64.tar.gz
            oswispa_amd64.deb
            oswispa_x86_64.rpm
            oswispa-macos-arm64.zip
            oswispa-macos-arm64.dmg
            oswispa-macos-x86_64.zip
            oswispa-macos-x86_64.dmg
          )
          for asset in "${assets[@]}"; do
            test -s "$asset"
          done
          sha256sum "${assets[@]}" > SHA256SUMS

      - name: Publish GitHub release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          fail_on_unmatched_files: true
          generate_release_notes: true
          files: |
            release-assets/oswispa-linux-amd64.tar.gz
            release-assets/oswispa_amd64.deb
            release-assets/oswispa_x86_64.rpm
            release-assets/oswispa-macos-arm64.zip
            release-assets/oswispa-macos-arm64.dmg
            release-assets/oswispa-macos-x86_64.zip
            release-assets/oswispa-macos-x86_64.dmg
            release-assets/SHA256SUMS
