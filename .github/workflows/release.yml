name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libssl-dev \
            libasound2-dev \
            libdbus-1-dev \
            libgtk-4-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Build release binary (CPU-only)
        run: cargo build --release --locked

      - name: Install cargo-deb
        run: cargo install cargo-deb --locked

      - name: Build .deb package
        run: cargo deb --locked

      - name: Install cargo-generate-rpm
        run: cargo install cargo-generate-rpm --locked

      - name: Build .rpm package
        run: cargo generate-rpm

      - name: Prepare stable asset names
        run: |
          set -euo pipefail
          deb_path="$(ls -1 target/debian/*.deb | head -n 1)"
          cp "$deb_path" oswispa_amd64.deb

          rpm_path="$(ls -1 target/generate-rpm/*.rpm | head -n 1)"
          cp "$rpm_path" oswispa_x86_64.rpm

      - name: Package tarball
        run: |
          mkdir -p dist
          cp target/release/oswispa dist/oswispa
          cp README.md LICENSE dist/
          tar -czf oswispa-linux-amd64.tar.gz -C dist .

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: oswispa-linux-amd64
          path: |
            oswispa-linux-amd64.tar.gz
            oswispa_amd64.deb
            oswispa_x86_64.rpm

      - name: Publish GitHub Release Asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            oswispa-linux-amd64.tar.gz
            oswispa_amd64.deb
            oswispa_x86_64.rpm

  build-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            arch: arm64
            build_args: --release --locked --no-default-features --features gpu-metal --target aarch64-apple-darwin
          - os: macos-13
            target: x86_64-apple-darwin
            arch: x86_64
            build_args: --release --locked --no-default-features --target x86_64-apple-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build ${{ matrix.build_args }}

      - name: Package macOS app bundle
        run: |
          set -euo pipefail
          version="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n 1)"
          stage_root="$PWD/dist/macos"
          dmg_root="$stage_root/dmg"
          app_dir="$dmg_root/OSWispa.app"
          contents_dir="$app_dir/Contents"

          rm -rf "$stage_root"
          mkdir -p "$contents_dir/MacOS" "$contents_dir/Resources/bin"

          cp "target/${{ matrix.target }}/release/oswispa" "$contents_dir/Resources/bin/oswispa"
          chmod +x "$contents_dir/Resources/bin/oswispa"

          cp packaging/macos/launcher.sh "$contents_dir/MacOS/OSWispa"
          chmod +x "$contents_dir/MacOS/OSWispa"

          sed "s/@VERSION@/$version/g" packaging/macos/Info.plist.template > "$contents_dir/Info.plist"

          cp packaging/macos/README.txt "$dmg_root/README.txt"
          cp README.md "$dmg_root/README.md"
          cp LICENSE "$dmg_root/LICENSE"
          cp packaging/macos/README.txt "$contents_dir/Resources/README.txt"
          cp LICENSE "$contents_dir/Resources/LICENSE"

          ln -s /Applications "$dmg_root/Applications"

          ditto -c -k --sequesterRsrc --keepParent "$app_dir" "oswispa-macos-${{ matrix.arch }}.zip"
          hdiutil create -volname "OSWispa Installer" -srcfolder "$dmg_root" -ov -format UDZO "oswispa-macos-${{ matrix.arch }}.dmg"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: oswispa-macos-${{ matrix.arch }}
          path: |
            oswispa-macos-${{ matrix.arch }}.zip
            oswispa-macos-${{ matrix.arch }}.dmg

      - name: Publish GitHub Release Asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            oswispa-macos-${{ matrix.arch }}.zip
            oswispa-macos-${{ matrix.arch }}.dmg
