name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libssl-dev \
            libasound2-dev \
            libdbus-1-dev \
            libgtk-4-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Build release binary (CPU-only)
        run: cargo build --release --locked

      - name: Install cargo-deb
        run: cargo install cargo-deb --locked

      - name: Build .deb package
        run: cargo deb --locked

      - name: Prepare stable asset names
        run: |
          set -euo pipefail
          deb_path="$(ls -1 target/debian/*.deb | head -n 1)"
          cp "$deb_path" oswispa_amd64.deb

      - name: Package artifact
        run: |
          mkdir -p dist
          cp target/release/oswispa dist/oswispa
          cp README.md LICENSE dist/
          tar -czf oswispa-linux-amd64-cpu.tar.gz -C dist .

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: oswispa-linux-amd64
          path: |
            oswispa-linux-amd64-cpu.tar.gz
            target/debian/*.deb
            oswispa_amd64.deb

      - name: Publish GitHub Release Asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            oswispa-linux-amd64-cpu.tar.gz
            target/debian/*.deb
            oswispa_amd64.deb

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Build release binary (CPU-only, no GUI)
        run: cargo build --release --locked --no-default-features

      - name: Package artifact
        run: |
          mkdir -p dist
          cp target/release/oswispa dist/oswispa
          cp README.md LICENSE dist/
          tar -czf oswispa-macos-arm64-cpu.tar.gz -C dist .

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: oswispa-macos-arm64
          path: oswispa-macos-arm64-cpu.tar.gz

      - name: Publish GitHub Release Asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: oswispa-macos-arm64-cpu.tar.gz
