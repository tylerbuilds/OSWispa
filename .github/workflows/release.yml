name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-release:
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Validate tag and source commit
        if: github.ref_type == 'tag'
        shell: bash
        run: |
          set -euo pipefail
          package_version="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n 1)"
          tag_version="${GITHUB_REF_NAME#v}"
          test -n "$package_version"
          test "$tag_version" = "$package_version"
          git fetch --no-tags origin master
          tag_commit="$(git rev-parse "${GITHUB_SHA}^{commit}")"
          master_commit="$(git rev-parse "origin/master^{commit}")"
          test "$tag_commit" = "$master_commit"

  build-linux:
    needs: validate-release
    runs-on: ubuntu-22.04
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libssl-dev \
            libasound2-dev \
            libdbus-1-dev \
            libgtk-4-dev \
            desktop-file-utils \
            rpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4
        with:
          toolchain: stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: ubuntu-22.04-glibc-2.35

      - name: Build release binary (CPU-only)
        run: cargo build --release --locked

      - name: Build packages
        run: |
          cargo install cargo-deb --version 3.7.0 --locked
          cargo deb --locked
          cargo install cargo-generate-rpm --version 0.21.0 --locked
          cargo generate-rpm

      - name: Validate package metadata
        shell: bash
        run: |
          set -euo pipefail
          desktop-file-validate packaging/linux/oswispa.desktop

          deb_path="$(find target/debian -maxdepth 1 -name '*.deb' -print -quit)"
          rpm_path="$(find target/generate-rpm -maxdepth 1 -name '*.rpm' -print -quit)"
          test -n "$deb_path"
          test -n "$rpm_path"

          deb_requires="$(dpkg-deb -f "$deb_path" Depends)"
          for dependency in alsa-utils ydotool netcat-openbsd wl-clipboard xclip xdotool; do
            grep -Eq "(^|, )${dependency}([ ,(]|$)" <<<"$deb_requires"
          done

          rpm_requires="$(rpm -qp --requires "$rpm_path")"
          for dependency in alsa-utils ydotool nmap-ncat wl-clipboard xclip xdotool; do
            grep -Fxq "$dependency" <<<"$rpm_requires"
          done

      - name: Prepare stable asset names
        shell: bash
        run: |
          set -euo pipefail
          deb_path="$(find target/debian -maxdepth 1 -name '*.deb' -print -quit)"
          rpm_path="$(find target/generate-rpm -maxdepth 1 -name '*.rpm' -print -quit)"
          cp "$deb_path" oswispa_amd64.deb
          cp "$rpm_path" oswispa_x86_64.rpm

          mkdir -p dist
          cp target/release/oswispa dist/oswispa
          cp README.md LICENSE dist/
          tar -czf oswispa-linux-amd64.tar.gz -C dist .

      - name: Upload build artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: oswispa-linux-amd64
          retention-days: 7
          if-no-files-found: error
          path: |
            oswispa-linux-amd64.tar.gz
            oswispa_amd64.deb
            oswispa_x86_64.rpm

  build-macos:
    needs: validate-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            target: aarch64-apple-darwin
            arch: arm64
            rust_arch: aarch64
            build_args: --release --locked --no-default-features --features gpu-metal --target aarch64-apple-darwin
          - os: macos-15-intel
            target: x86_64-apple-darwin
            arch: x86_64
            rust_arch: x86_64
            build_args: --release --locked --no-default-features --target x86_64-apple-darwin
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    env:
      MACOSX_DEPLOYMENT_TARGET: "12.0"
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Build release binary
        run: cargo build ${{ matrix.build_args }}

      - name: Package macOS app bundle
        shell: bash
        run: |
          set -euo pipefail
          version="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n 1)"
          stage_root="$PWD/dist/macos"
          dmg_root="$stage_root/dmg"
          app_dir="$dmg_root/MorpheOS Voice.app"
          contents_dir="$app_dir/Contents"

          rm -rf "$stage_root"
          mkdir -p "$contents_dir/MacOS" "$contents_dir/Resources/bin"

          cp "target/${{ matrix.target }}/release/oswispa" "$contents_dir/Resources/bin/oswispa"
          chmod +x "$contents_dir/Resources/bin/oswispa"

          cp packaging/macos/launcher.sh "$contents_dir/MacOS/OSWispa"
          chmod +x "$contents_dir/MacOS/OSWispa"

          sed "s/@VERSION@/$version/g" packaging/macos/Info.plist.template > "$contents_dir/Info.plist"

          cp packaging/macos/README.txt "$dmg_root/README.txt"
          cp README.md "$dmg_root/README.md"
          cp LICENSE "$dmg_root/LICENSE"
          cp packaging/macos/README.txt "$contents_dir/Resources/README.txt"
          cp LICENSE "$contents_dir/Resources/LICENSE"

          ln -s /Applications "$dmg_root/Applications"

          ditto -c -k --sequesterRsrc --keepParent "$app_dir" "oswispa-macos-${{ matrix.arch }}.zip"
          hdiutil create -volname "MorpheOS Voice" -srcfolder "$dmg_root" -ov -format UDZO "oswispa-macos-${{ matrix.arch }}.dmg"

      - name: Install DMG and run packaged app smoke test
        shell: bash
        run: |
          set -euo pipefail
          version="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n 1)"
          mount_point="$RUNNER_TEMP/oswispa-dmg"
          install_root="$RUNNER_TEMP/Applications"
          mkdir -p "$mount_point" "$install_root"
          hdiutil attach -nobrowse -readonly -mountpoint "$mount_point" "oswispa-macos-${{ matrix.arch }}.dmg"
          trap 'hdiutil detach "$mount_point" >/dev/null 2>&1 || true' EXIT
          ditto "$mount_point/MorpheOS Voice.app" "$install_root/MorpheOS Voice.app"
          hdiutil detach "$mount_point"
          trap - EXIT

          plist="$install_root/MorpheOS Voice.app/Contents/Info.plist"
          plutil -lint "$plist"
          test "$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' "$plist")" = "$version"

          output="$("$install_root/MorpheOS Voice.app/Contents/MacOS/OSWispa" --platform-smoke-test)"
          printf '%s\n' "$output"
          grep -Fq "OSWISPA_PLATFORM_SMOKE_OK version=$version os=macos arch=${{ matrix.rust_arch }}" <<<"$output"
          grep -Fq "audio=macos-coreaudio-cpal hotkey=macos-rdev input=macos-arboard-enigo" <<<"$output"

      - name: Upload build artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: oswispa-macos-${{ matrix.arch }}
          retention-days: 7
          if-no-files-found: error
          path: |
            oswispa-macos-${{ matrix.arch }}.zip
            oswispa-macos-${{ matrix.arch }}.dmg

  build-windows:
    needs: validate-release
    runs-on: windows-2025
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4
        with:
          toolchain: stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Build release binary
        run: cargo build --release --locked --no-default-features

      - name: Package Windows app
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -ItemType Directory -Force dist\windows | Out-Null
          Copy-Item target\release\oswispa.exe dist\windows\oswispa.exe
          Copy-Item packaging\windows\README.txt dist\windows\README.txt
          Copy-Item README.md dist\windows\README.md
          Copy-Item LICENSE dist\windows\LICENSE
          Compress-Archive -Path dist\windows\* -DestinationPath oswispa-windows-x86_64.zip -Force

      - name: Install ZIP and run packaged app smoke test
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $version = (Select-String -Path Cargo.toml -Pattern '^version = "(.+)"$').Matches[0].Groups[1].Value
          $installRoot = Join-Path $env:RUNNER_TEMP "Programs\OSWispa"
          Expand-Archive oswispa-windows-x86_64.zip -DestinationPath $installRoot -Force
          $output = & "$installRoot\oswispa.exe" --platform-smoke-test
          if ($LASTEXITCODE -ne 0) { throw "Packaged Windows app smoke test failed" }
          $output | Write-Host
          $joined = $output -join "`n"
          if (-not $joined.Contains("OSWISPA_PLATFORM_SMOKE_OK version=$version os=windows arch=x86_64")) {
            throw "Packaged Windows app did not report the expected version and platform"
          }
          if (-not $joined.Contains("audio=windows-wasapi-cpal hotkey=windows-rdev input=windows-arboard-enigo")) {
            throw "Packaged Windows app did not report the expected runtime backends"
          }

      - name: Upload build artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: oswispa-windows-x86_64
          retention-days: 7
          if-no-files-found: error
          path: oswispa-windows-x86_64.zip

  publish:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: release-assets
          merge-multiple: true

      - name: Verify release set and create checksums
        shell: bash
        run: |
          set -euo pipefail
          cd release-assets
          assets=(
            oswispa-linux-amd64.tar.gz
            oswispa_amd64.deb
            oswispa_x86_64.rpm
            oswispa-macos-arm64.zip
            oswispa-macos-arm64.dmg
            oswispa-macos-x86_64.zip
            oswispa-macos-x86_64.dmg
            oswispa-windows-x86_64.zip
          )
          for asset in "${assets[@]}"; do
            test -s "$asset"
          done
          sha256sum "${assets[@]}" > SHA256SUMS

      - name: Publish GitHub release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          fail_on_unmatched_files: true
          generate_release_notes: true
          files: |
            release-assets/oswispa-linux-amd64.tar.gz
            release-assets/oswispa_amd64.deb
            release-assets/oswispa_x86_64.rpm
            release-assets/oswispa-macos-arm64.zip
            release-assets/oswispa-macos-arm64.dmg
            release-assets/oswispa-macos-x86_64.zip
            release-assets/oswispa-macos-x86_64.dmg
            release-assets/oswispa-windows-x86_64.zip
            release-assets/SHA256SUMS
