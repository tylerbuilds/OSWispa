<!doctype html>
<html lang="en" data-bridge="development">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark">
  <title>MorpheOS Voice Signal preview</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="signal-body" data-surface="signal">
  <main class="signal-shell" data-signal-root data-state="ready" aria-live="polite" aria-atomic="true">
    <h1 class="sr-only">MorpheOS Voice Signal status</h1>
    <div class="signal-mark" aria-hidden="true">
      <span class="signal-ring signal-ring--outer"></span>
      <span class="signal-ring signal-ring--inner"></span>
      <span class="voice-cursor"></span>
    </div>
    <div class="signal-copy">
      <p class="signal-label" data-signal-label>Ready</p>
      <p class="signal-detail" data-signal-detail>Hold Ctrl + Super to speak</p>
    </div>
    <span class="signal-receipt" data-signal-receipt>Local</span>
    <span class="signal-preview-label">Development preview</span>
  </main>

  <script src="bridge.js"></script>
  <script src="tauri-adapter.js"></script>
  <script src="app.js"></script>
</body>
</html>
